name: Deploy Production

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/philku/htdocs/philku.de

            echo "=== Git Pull ==="
            git pull origin main

            echo "=== Composer Install ==="
            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-progress --no-interaction

            echo "=== Tailwind Build ==="
            php8.4 bin/console tailwind:build --minify

            echo "=== NHL React Build ==="
            cd nhl-standings && npm ci && npm run build && cd ..

            echo "=== Database Migrations ==="
            php8.4 bin/console doctrine:migrations:migrate --no-interaction

            echo "=== Asset Map Compile ==="
            php8.4 bin/console asset-map:compile

            echo "=== Cache Clear ==="
            php8.4 bin/console cache:clear

            echo "=== Production Deploy Complete ==="
