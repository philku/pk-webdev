name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: pkwebdev_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      APP_ENV: test
      APP_SECRET: '$ecretf0rt3st'
      KERNEL_CLASS: App\Kernel
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/pkwebdev?serverVersion=11.8.0-mariadb&charset=utf8mb4
      REDIS_URL: redis://127.0.0.1:6379
      SETLISTFM_API_KEY: test-key
      SPOTIFY_CLIENT_ID: test-id
      SPOTIFY_CLIENT_SECRET: test-secret
      IGDB_CLIENT_ID: test-id
      IGDB_CLIENT_SECRET: test-secret
      GEMINI_API_KEY: test-key
      GEMINI_MODEL: gemini-3.1-flash-lite-preview

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, mbstring, xml, curl, redis
          tools: composer:v2

      - name: Composer Cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist --no-progress

      # Tests render Twig templates that reference the Tailwind asset.
      - name: Tailwind build
        run: php bin/console tailwind:build --minify

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction

      - name: Composer Security Audit
        run: composer audit

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  nhl-build:
    name: NHL React Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: nhl-standings/package-lock.json

      - name: npm ci
        run: npm ci
        working-directory: nhl-standings

      - name: npm Security Audit
        run: npm audit --audit-level=high
        working-directory: nhl-standings

      - name: Build
        run: npm run build
        working-directory: nhl-standings
