# CI-Pipeline: Läuft bei jedem Push auf main und bei Pull Requests.
# Prüft ob Tests grün sind und ob alle Assets gebaut werden können.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Node.js 24 für GitHub Actions — ab Juni 2026 Pflicht,
# wir stellen jetzt schon um damit keine Deprecation-Warnings kommen.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==================== PHP TESTS ====================
  # Fährt MariaDB + Redis als Service-Container hoch,
  # installiert PHP 8.4 + Composer, führt Migrations aus, startet PHPUnit.
  tests:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      # MariaDB 11.8 — gleiche Version wie im DDEV-Setup.
      # GitHub Actions startet das als Docker-Container neben unserem Job.
      mariadb:
        image: mariadb:11.8
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: pkwebdev
          MARIADB_USER: test
          MARIADB_PASSWORD: test
        ports:
          - 3306:3306
        # Healthcheck: Wartet bis MariaDB wirklich bereit ist,
        # damit die Tests nicht gegen eine noch startende DB laufen.
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      # Redis 7 — für den Cache (Metallica Konzerte etc.)
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # Code aus dem Repo auschecken
      - uses: actions/checkout@v4

      # PHP 8.4 installieren mit den Extensions die Symfony braucht
      - name: PHP 8.4 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ctype, iconv, intl, mbstring, xml, curl, redis
          tools: composer:v2

      # Composer-Cache nutzen damit nicht jedes Mal alles neu runtergeladen wird.
      # Der Key basiert auf composer.lock — ändert sich nur wenn Dependencies sich ändern.
      - name: Composer Cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # Dependencies installieren (inkl. dev-Dependencies für PHPUnit)
      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      # Datenbank-Migrations ausführen damit die Tabellen existieren
      - name: Datenbank migrieren
        run: php bin/console doctrine:migrations:migrate --no-interaction
        env:
          APP_ENV: test
          DATABASE_URL: mysql://test:test@127.0.0.1:3306/pkwebdev?serverVersion=11.8.0-mariadb&charset=utf8mb4

      # PHPUnit starten — alle Tests im tests/ Ordner
      - name: PHPUnit ausführen
        run: vendor/bin/phpunit
        env:
          APP_ENV: test
          APP_SECRET: '$ecretf0rt3st'
          KERNEL_CLASS: App\Kernel
          DATABASE_URL: mysql://test:test@127.0.0.1:3306/pkwebdev?serverVersion=11.8.0-mariadb&charset=utf8mb4
          REDIS_URL: redis://127.0.0.1:6379
          SETLISTFM_API_KEY: test-key
          SPOTIFY_CLIENT_ID: test-id
          SPOTIFY_CLIENT_SECRET: test-secret
          IGDB_CLIENT_ID: test-id
          IGDB_CLIENT_SECRET: test-secret
          GEMINI_API_KEY: test-key
          GEMINI_MODEL: gemini-3.1-flash-lite-preview

  # ==================== TAILWIND BUILD ====================
  # Prüft ob der Tailwind CSS Build funktioniert.
  # Das SymfonyCasts Tailwind Bundle managed die Tailwind Binary selbst.
  tailwind:
    name: Tailwind CSS Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP 8.4 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Composer Cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Composer install
        run: composer install --no-interaction --prefer-dist

      # Tailwind CSS kompilieren — das Bundle lädt die Binary automatisch
      # und scannt alle Twig-Templates nach verwendeten Klassen.
      - name: Tailwind build
        run: php bin/console tailwind:build --minify

  # ==================== NHL REACT BUILD ====================
  # Prüft ob der TypeScript-Check und Vite-Build für die React-App funktionieren.
  nhl-build:
    name: NHL React Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 22 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: nhl-standings/package-lock.json

      # npm ci = "clean install" — installiert exakt die Versionen aus package-lock.json.
      # Schneller und reproduzierbarer als npm install.
      - name: npm ci
        run: npm ci
        working-directory: nhl-standings

      # "npm run build" führt erst tsc --noEmit (TypeScript-Check) aus,
      # dann den Vite-Build der das JS-Bundle nach public/nhl-build/ schreibt.
      - name: Build
        run: npm run build
        working-directory: nhl-standings
