framework:
    cache:
        # prefix_seed verhindert Cache-Key-Kollisionen wenn mehrere Apps
        # denselben Redis-Server teilen. Symfony hasht diesen Seed
        # und prefixed jeden Key damit → keine Überschneidungen.
        prefix_seed: pk-webdev

        # Redis als Cache-Backend statt Filesystem.
        # Vorteile gegenüber Filesystem:
        #   - Schneller: Daten liegen im RAM statt auf der Platte
        #   - Atomar: Keine Race Conditions bei parallelen Schreibzugriffen
        #   - TTL nativ: Redis löscht abgelaufene Keys automatisch
        #   - Produktionsstandard: Gleiche Infrastruktur lokal und auf dem VPS
        app: cache.adapter.redis

        # Die Redis-URL kommt aus der .env (Umgebungsvariable REDIS_URL).
        # So kann jede Umgebung (DDEV, Staging, Produktion) ihren eigenen
        # Redis-Server haben ohne den Code zu ändern.
        default_redis_provider: '%env(REDIS_URL)%'
